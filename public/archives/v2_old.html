<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Beurreland — La religion sacrée du beurre</title>

    <meta name="description"
        content="Bienvenue sur Beurreland, la religion sacrée du beurre. Lore absurde, humour 2000s, et culte beurré légendaire." />

    <meta name="keywords" content="beurre, religion du beurre, beurreland, humour, site rétro, jambon beurre" />

    <meta name="author" content="Sarxzer" />

    <meta property="og:title" content="Beurreland — La religion du beurre" />
    <meta property="og:description" content="Le site le plus beurré d'internet." />
    <meta property="og:type" content="website" />

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #ffffcc;
            background-image:
                linear-gradient(45deg,
                    rgba(255, 255, 255, 0.35) 25%,
                    transparent 25%),
                linear-gradient(-45deg,
                    rgba(255, 255, 255, 0.35) 25%,
                    transparent 25%),
                linear-gradient(45deg,
                    transparent 75%,
                    rgba(255, 255, 255, 0.35) 75%),
                linear-gradient(-45deg,
                    transparent 75%,
                    rgba(255, 255, 255, 0.35) 75%);
            background-size: 24px 24px;
            background-position:
                0 0,
                0 12px,
                12px -12px,
                -12px 0px;
            color: #333;
            margin: 0;

            display: flex;
            flex-direction: column;
            /* stack h1 + p vertically */
            align-items: center;
            /* horizontal center */
            text-align: center;
            /* center text inside elements */
        }

        h1 {
            color: #d2691e;
            font-size: 3em;
            margin: 20px 0 10px;
            font-weight: bold;
        }

        p {
            font-size: 1.2em;
        }

        a {
            display: inline-block;
            color: #d2691e;
            text-decoration: none;
        }

        a:hover>span {
            text-decoration: underline;
        }

        span.wave-auto {
            display: inline-block;
            animation: wave 1s ease-in-out infinite;
        }

        footer {
            margin-top: auto;
            /* push footer to the bottom */
            background-color: #f0e68c;
            padding: 10px;
            width: 100%;
            text-align: center;
        }

        footer p {
            margin: 0;
            font-size: 0.9em;
        }

        /* Animation keyframes */
        @keyframes wave {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-6px);
            }
        }
    </style>
</head>

<body>
    <h1 class="wave-auto">Beurreland</h1>
    <p>
        Bienvenue sur beurreland, le site de la religion du Jambon-Beurre,
        la seule et unique religion, où l'on vénère le saint Dieu du Beurre
        et le Jambon Vercuvien.
    </p>

    <footer>
        <p>
            Nous contacter :
            <a href="mailto:frescri@beurreland.cc" class="wave-auto">frescri@beurreland.cc</a>
        </p>

        <p>&copy; 2026 Beurreland. Tous droits réservés.</p>
        <p>&copy; 2026 Sarxzer. Tous droits réservés.</p>
    </footer>
    <script>
        document.querySelectorAll(".wave-auto").forEach((link) => {
            const text = link.textContent;
            link.textContent = "";
            [...text].forEach((char, i) => {
                const span = document.createElement("span");
                span.classList.add("wave-auto");
                span.textContent = char === " " ? "\u00A0" : char;
                span.style.animationDelay = `${i * 0.05}s`;
                link.appendChild(span);
            });
        });
    </script>
</body>


</html>
